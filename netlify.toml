[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# Next.js Plugin für Netlify
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Headers für statische Assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirect: www → non-www
[[redirects]]
  from = "https://www.schluesseldienst-wetzlar-24.de/*"
  to = "https://schluesseldienst-wetzlar-24.de/:splat"
  status = 301
  force = true
